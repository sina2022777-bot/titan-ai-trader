services:
  - type: web
    name: titan-ai-trader
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn titan_ai_trader.telegram_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXCHANGE
        value: bybit
      - key: LIVE_TRADING
        value: false
      - key: SANDBOX
        value: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_ID
        sync: false
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
